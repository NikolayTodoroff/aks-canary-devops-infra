apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: voting-viewer-binding
  namespace: {{ .Values.namespace }}
subjects:
  - kind: Group
    name: {{ .Values.rbac.adminGroupObjectId | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: voting-viewer
  apiGroup: rbac.authorization.k8s.io