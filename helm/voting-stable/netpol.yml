apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-stable
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: voting-app
      track: stable
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
  - to:
      - podSelector:
          matchLabels:
            app: redis
    ports:
      - protocol: TCP
        port: 6379

  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchLabels:
            k8s-app: kube-dns
    ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53