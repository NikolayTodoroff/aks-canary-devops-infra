namespace: voting

redis:
  image:
    repository: redis
    tag: "7.2"
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  storage:
    size: 1Gi
    storageClassName: managed-csi
  host: redis
  password: ""

ingress:
  className: nginx
  path: / 

hpa:
  minReplicas: 1
  maxReplicas: 6
  cpuUtilization: 70

rbac:
  adminGroupObjectId: ""  