trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/**
      - helm/voting-stable/**
      - helm/voting-infra/**

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - prod

pool:
  vmImage: 'ubuntu-latest'

variables:
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: akscanaryado-dev-vars
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: akscanaryado-prod-vars
  - name: acrName
    value: 'acrakscanaryado${{ parameters.environment }}'
  - name: aksResourceGroup
    value: 'rg-main-akscanaryado-${{ parameters.environment }}'
  - name: aksClusterName
    value: 'aks-akscanaryado-${{ parameters.environment }}'
  - name: imageRepository
    value: 'azure-vote-front'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:
  - stage: Build
    displayName: 'Build and Push Image'
    jobs:
      - job: Build
        steps:
          - task: AzureCLI@2
            displayName: 'Build and Push to ACR'
            inputs:
              azureSubscription: 'service_connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(acrName)
                docker build -t $(acrName).azurecr.io/$(imageRepository):$(imageTag) \
                  app/azure-vote
                docker push $(acrName).azurecr.io/$(imageRepository):$(imageTag)

  - stage: SetupIngress
    displayName: 'Setup Ingress Controller'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - template: helm-deploy.yml
        parameters:
          stageName: 'SetupIngress'
          displayName: 'Install ingress-nginx'
          environment: ${{ parameters.environment }}
          aksResourceGroup: $(aksResourceGroup)
          aksClusterName: $(aksClusterName)
          helmCommand: |
            helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
            helm repo update
            helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
              --namespace ingress-nginx \
              --create-namespace \
              --set controller.replicaCount=1 \
              --set controller.nodeSelector."nodepool-type"=user \
              --wait \
              --timeout 5m

  - stage: DeployVotingInfra
    displayName: 'Deploy voting-infra'
    dependsOn: SetupIngress
    condition: succeeded()
    jobs:
      - template: helm-deploy.yml
        parameters:
          stageName: 'DeployVotingInfra'
          displayName: 'Helm Deploy voting-infra'
          environment: ${{ parameters.environment }}
          aksResourceGroup: $(aksResourceGroup)
          aksClusterName: $(aksClusterName)
          helmCommand: |
            helm upgrade --install voting-infra helm/voting-infra \
              --values helm/voting-infra/values.yml \
              --values helm/voting-infra/values-${{ parameters.environment }}.yml \
              --namespace voting \
              --create-namespace \
              --wait \
              --timeout 5m

  - stage: DeployStable
    displayName: 'Deploy voting-stable'
    dependsOn: DeployVotingInfra
    condition: succeeded()
    jobs:
      - template: helm-deploy.yml
        parameters:
          stageName: 'DeployStable'
          displayName: 'Helm Deploy voting-stable'
          environment: ${{ parameters.environment }}
          aksResourceGroup: $(aksResourceGroup)
          aksClusterName: $(aksClusterName)
          helmCommand: |
            helm upgrade --install voting-stable helm/voting-stable \
              --values helm/voting-stable/values.yml \
              --values helm/voting-stable/values-${{ parameters.environment }}.yml \
              --set-string image.repository=$(acrName).azurecr.io/$(imageRepository) \
              --set-string image.tag=$(imageTag) \
              --namespace voting \
              --create-namespace \
              --wait \
              --timeout 5m